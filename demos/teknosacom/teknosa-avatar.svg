    <polygon fill="#fff" points="142.7,99.5 157.7,99.5 157.7,82.2 164.3,82.2 185.8,99.5 207,99.5 177.5,76.4 203.9,54.4 183.5,54.4 164.7,70.9 157.7,70.9 157.7,54.4 142.7,54.4"/>
    <polygon fill="#fff" points="207.9,99.5 222.8,99.5 222.8,66.7 223,66.7 251.1,99.5 274.2,99.5 274.2,54.4 259.3,54.4 259.3,87.1 259.1,87.1 231,54.4 207.9,54.4"/>
