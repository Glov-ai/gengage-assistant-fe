  <!-- Large storefront window - shows TV/screens inside -->
  <rect x="17" y="54" width="86" height="28" rx="2" fill="#e0ecf8" stroke="#083d7a" stroke-width="0.8"/>

  <!-- Big TV display (main showpiece) -->
  <rect x="22" y="57" width="30" height="20" rx="1.5" fill="#1a1a2e"/>
  <rect x="24" y="59" width="26" height="15" rx="1" fill="#2d5aa0"/>
  <!-- TV screen content - landscape -->
  <rect x="24" y="59" width="26" height="10" rx="1" fill="#4a90d9"/>
  <circle cx="37" cy="64" r="3" fill="#F37221" opacity="0.6"/>
  <rect x="26" y="70" width="10" height="2" rx="0.5" fill="#fff" opacity="0.3"/>
  <!-- TV stand -->
  <rect x="33" y="77" width="8" height="2" rx="0.5" fill="#333"/>

  <!-- Laptop display -->
  <rect x="57" y="62" width="18" height="12" rx="1" fill="#1a1a2e"/>
  <rect x="58.5" y="63.5" width="15" height="9" rx="0.5" fill="#3a7bc8"/>
  <!-- Laptop keyboard base -->
  <path d="M55,74 L77,74 L79,78 L53,78 Z" fill="#666"/>

  <!-- Phone on stand -->
  <rect x="82" y="60" width="8" height="14" rx="1.5" fill="#1a1a2e"/>
  <rect x="83" y="62" width="6" height="10" rx="0.5" fill="#5b9bd5"/>
  <!-- Phone notch -->
  <rect x="84.5" y="61" width="3" height="0.8" rx="0.4" fill="#333"/>

  <!-- Tablet -->
  <rect x="93" y="60" width="7" height="10" rx="1" fill="#1a1a2e"/>
  <rect x="94" y="61.5" width="5" height="7" rx="0.5" fill="#4a8ec4"/>

  <!-- Smart speaker / IoT -->
  <ellipse cx="47" cy="76" rx="4" ry="3" fill="#333"/>
  <ellipse cx="47" cy="74" rx="3.5" ry="2" fill="#F37221" opacity="0.7"/>

  <!-- Headphones on stand -->
  <path d="M20,80 C20,74 26,74 26,80" fill="none" stroke="#333" stroke-width="1.5"/>
  <rect x="18.5" y="79" width="3" height="3" rx="1" fill="#333"/>
  <rect x="24.5" y="79" width="3" height="3" rx="1" fill="#333"/>

  <!-- LED strip accent on window top -->
  <line x1="18" y1="54.5" x2="102" y2="54.5" stroke="#F37221" stroke-width="1" opacity="0.8"/>

  <!-- Glass entrance door -->
  <rect x="44" y="83" width="14" height="9" rx="1" fill="#c8ddf0" stroke="#083d7a" stroke-width="0.6"/>
  <rect x="46" y="85" width="4" height="6" rx="0.5" fill="#dce9f5"/>
  <rect x="52" y="85" width="4" height="6" rx="0.5" fill="#dce9f5"/>
  <!-- Door handle -->
  <rect x="50" y="87" width="2" height="3" rx="0.5" fill="#F37221"/>

  <!-- Side pillars -->
  <rect x="12" y="42" width="4" height="50" fill="#083d7a"/>
  <rect x="104" y="42" width="4" height="50" fill="#083d7a"/>

  <!-- Neon glow effect at bottom -->
  <rect x="12" y="90" width="96" height="2" rx="1" fill="#F37221" opacity="0.6"/>

  <!-- Ground reflection -->
  <rect x="20" y="94" width="80" height="4" rx="1" fill="#0B53A5" opacity="0.15"/>

  <!-- WiFi/signal icon on roof -->
  <g transform="translate(55, 18)">
    <path d="M5,10 C5,10 0,5 5,0 C10,5 5,10 5,10Z" fill="#F37221" opacity="0.8"/>
    <path d="M-2,8 Q5,-2 12,8" fill="none" stroke="#F37221" stroke-width="1" opacity="0.5"/>
    <path d="M-5,11 Q5,-5 15,11" fill="none" stroke="#F37221" stroke-width="1" opacity="0.3"/>
  </g>
</svg>
