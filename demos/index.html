    <style>
      :root {
        --bg: #0f172a;
        --surface: #1e293b;
        --surface-hover: #334155;
        --border: #334155;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font);
        line-height: 1.5;
        min-height: 100vh;
      }

      .header {
        padding: 40px 24px 20px;
        text-align: center;
      }

      .header h1 {
        margin: 0 0 6px;
        font-size: 28px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .header p {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
      }

      .grid {
        max-width: 960px;
        margin: 0 auto;
        padding: 20px 24px 60px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 16px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 20px;
        text-decoration: none;
        color: var(--text);
        transition:
          background 0.15s,
          border-color 0.15s,
          transform 0.15s;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .card:hover {
        background: var(--surface-hover);
        border-color: var(--brand);
        transform: translateY(-2px);
      }

      .card-top {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .card-swatch {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        flex-shrink: 0;
        background: #ffffff;
        border: 2px solid rgba(255, 255, 255, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        position: relative;
      }

      .card-swatch::after {
        content: '';
        position: absolute;
        bottom: 3px;
        right: 3px;
        width: 8px;
        height: 8px;
        border-radius: 2px;
        background: var(--brand);
      }

      .card-swatch img {
        width: 20px;
        height: 20px;
        object-fit: contain;
      }

      .card-swatch--logo {
        width: 72px;
        border-radius: 12px;
        padding: 4px 8px;
      }

      .card-swatch--logo::after {
        border-radius: 999px;
      }

      .card-swatch--logo img {
        width: 100%;
        height: 100%;
      }

      .card-title {
        font-size: 17px;
        font-weight: 700;
        letter-spacing: -0.01em;
      }

      .card-subtitle {
        font-size: 12px;
        color: var(--muted);
        font-weight: 400;
      }

      .card-skus {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .sku-chip {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 6px;
        padding: 3px 8px;
        font-size: 11px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        color: var(--muted);
      }

      .card-nav {
        color: var(--muted);
        font-size: 12px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .card-nav span {
        background: rgba(255, 255, 255, 0.04);
        padding: 2px 6px;
        border-radius: 4px;
      }

      .section-label {
        max-width: 960px;
        margin: 20px auto 0;
        padding: 0 24px;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .footer {
        text-align: center;
        padding: 20px;
        color: var(--muted);
        font-size: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
    </style>

      function renderMerchantCard(m) {

        const href = `${m.id}/?sku=${firstSku}`;
        const brandImageUrl = m.faviconUrl ?? m.logo ?? `https://www.google.com/s2/favicons?domain=${m.domain}&sz=32`;

          <a class="card" href="${href}" style="--brand: ${m.color}">
            <div class="card-top">
              <div class="${swatchClassName}">
                <img src="${brandImageUrl}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none'">

            <div class="card-nav">
              ${m.nav.map((n) => `<span>${n}</span>`).join('')}
            </div>

        const href = `${f.id}/`;
        return `
          <a class="card" href="${href}" style="--brand: ${f.color}">
            <div class="card-top">

              <div>

                <div class="card-subtitle">${f.desc}</div>
              </div>
            </div>
          </a>`;
      }

        .map(renderMerchantCard)
